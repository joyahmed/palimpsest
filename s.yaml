# Palimpsest -> Alibaba Cloud Function Compute 3.0
#
#   pnpm build && pnpm package:fc && s deploy
#
# This file, with the deployed function it produces, IS the proof-of-deployment
# artifact the hackathon rules ask for: a real backend, on Alibaba Cloud
# infrastructure, calling Qwen Cloud APIs.
#
# REGION is Singapore (ap-southeast-1), and not by preference:
#   - Qwen Cloud keys are valid ONLY against the DashScope *International* endpoint.
#     Point one at the mainland-China endpoint and it returns 401 invalid_api_key
#     even though the key is perfectly good.
#   - Singapore permits a 500 MB code package. Most regions cap at 100 MB, and we
#     ship a Node runtime inside ours.
#
# RUNTIME is custom.debian10 and we bring our own Node 24, because the claim store
# uses `node:sqlite` (Node 22+) and every FC-provided Node stops at 20. See
# src/scripts/package-fc.ts.
#
# SECRETS are not in this file, not in git, and not in the package. DASHSCOPE_API_KEY
# is read from the deploying shell's environment and set as a function env var by FC.

edition: 3.0.0
name: palimpsest
access: default

vars:
  region: ap-southeast-1

resources:
  palimpsest:
    component: fc3
    props:
      region: ${vars.region}
      functionName: palimpsest
      description: Agent memory that forgets. Claims with a lifecycle - provenance, decay, contradiction, revision.

      runtime: custom.debian10
      # Staged by `pnpm package:fc`. Never the repo root: that would ship .git, the
      # 6 MB replay cache, the source, and the .env.
      code: ./deploy
      customRuntimeConfig:
        command:
          - ./bootstrap
        port: 9000

      cpu: 0.5
      memorySize: 1024
      diskSize: 512
      # POST /api/remember runs the whole extract -> embed -> retrieve -> adjudicate
      # pipeline, and adjudication is a reasoning call to qwen3.7-plus. The default
      # 10s would truncate it mid-thought.
      #
      # 120 was not enough either, and the way it failed was ugly. A COLD, uncached
      # run of that pipeline measured 108.8s against this 120s ceiling - so the site
      # was passing with 11 seconds to spare, and any instance a little slower than
      # that got killed mid-adjudication and returned a bare 502 to the browser.
      # Reasoning-model latency is not something we control; a ceiling that sits ~10%
      # above the measured cost of the work is not a ceiling, it is a coin toss.
      #
      # The cache (below) is what makes the common path fast. This is what makes the
      # UNCACHED path merely slow instead of broken - a question nobody has asked
      # before now waits, and then answers, rather than 502ing.
      timeout: 600
      # Required: the function calls Qwen Cloud over the public internet.
      internetAccess: true

      environmentVariables:
        DASHSCOPE_API_KEY: ${env('DASHSCOPE_API_KEY')}
        QWEN_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
        # FC mounts the code read-only. server.ts copies the seed to /tmp and writes
        # there - an honest limitation, stated in the README rather than hidden.
        PALIMPSEST_SEED: /code/palimpsest.db
        PALIMPSEST_DB: /tmp/palimpsest.db
        PALIMPSEST_CACHE_DIR: /tmp/llm-cache
        # Read-only, shipped inside the package by `pnpm package:fc`. /tmp is per-instance
        # and dies with it; this does not. A cold instance starts already able to replay
        # every call we have paid for, so the demo cannot rot back into a 502 while idle.
        PALIMPSEST_CACHE_SEED: /code/llm-cache

      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS

  # ---------------------------------------------------------------- custom domain
  #
  # WHY THIS IS NOT OPTIONAL. Alibaba forcibly adds `Content-Disposition: attachment`
  # to any text/html served from a DEFAULT domain - *.fcapp.run and *.aliyuncs.com
  # alike, OSS static hosting included, in every region. It is an anti-abuse policy,
  # not a setting: you cannot turn it off. A browser pointed at the default URL
  # DOWNLOADS the audit view instead of rendering it.
  #
  # A custom domain is the only supported way to serve a web page from Alibaba. The
  # expensive part - ICP filing - applies only to mainland-China regions. We are in
  # Singapore, so it does not apply to us.
  domain:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: palimpsest.zettabyteincorp.com
      protocol: HTTP,HTTPS
      # Let's Encrypt, issued by `pnpm cert` (DNS-01). The PEMs live in certs/, which is
      # gitignored - the private key must never enter the repo. `pnpm deploy:tls` exports
      # them into the environment for this substitution. Deploying without them set will
      # fail loudly rather than silently downgrade to plain HTTP.
      certConfig:
        certName: palimpsest
        certificate: ${env('PALIMPSEST_TLS_CERT')}
        privateKey: ${env('PALIMPSEST_TLS_KEY')}
      routeConfig:
        routes:
          - functionName: palimpsest
            path: /*
            qualifier: LATEST
            methods:
              - GET
              - POST
              - OPTIONS

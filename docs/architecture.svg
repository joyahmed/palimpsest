<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#94a3b8"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#fb7185"/>
    </marker>
    <radialGradient id="glow" cx="18%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="1000" fill="#0b1120"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>

  <!-- ghosted dead claims, because that is what a palimpsest is -->
  <g opacity="0.05" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-weight="600" fill="#e2e8f0">
    <text x="70" y="250" font-size="40" text-decoration="line-through">The project uses Postgres.</text>
    <text x="720" y="905" font-size="34" text-decoration="line-through">Launch is September 1st.</text>
    <text x="240" y="660" font-size="30" text-decoration="line-through">The brand colour is #1E4D8C.</text>
  </g>

  <!-- One <text> per line. Chaining fragments at hand-computed x offsets is how you get
       a title overlapping its own tagline - which is exactly what the first render did. -->
  <text x="60" y="60" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="29" font-weight="700" fill="#e2e8f0">
    Palimpsest<tspan font-size="18" font-weight="400" fill="#94a3b8" dx="14">— agent memory that forgets</tspan>
  </text>
  <text x="60" y="90" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14.5" fill="#94a3b8">
    A memory is a <tspan font-weight="650" fill="#5eead4">claim with a lifecycle</tspan>, not a chunk of text — so it can be contradicted, superseded, and killed.
  </text>

  <!-- ============================== WRITE PATH ============================== -->
  <text x="60" y="142" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12" font-weight="700" fill="#94a3b8"
        letter-spacing="1.6">WRITE PATH — HOW A BELIEF DIES</text>

  
  <g>
    <rect x="60" y="160" width="200" height="84" rx="10"
          fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="60" y="160" width="3.5" height="84" rx="2" fill="#1e293b"/>
    <text x="78" y="188" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Transcript</text>
    <text x="78" y="210" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#94a3b8">a conversation</text>
    <text x="78" y="232" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">not yet a memory</text>
  </g>
  
  <line x1="268" y1="202" x2="307" y2="202" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  
  <g>
    <rect x="316" y="160" width="226" height="84" rx="10"
          fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="316" y="160" width="3.5" height="84" rx="2" fill="#fbbf24"/>
    <text x="334" y="188" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Extract</text>
    <text x="334" y="210" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#fbbf24">qwen3.6-flash</text>
    <text x="334" y="232" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">atomic claims</text>
  </g>
  
  <line x1="550" y1="202" x2="589" y2="202" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  
  <g>
    <rect x="598" y="160" width="236" height="84" rx="10"
          fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="598" y="160" width="3.5" height="84" rx="2" fill="#fbbf24"/>
    <text x="616" y="188" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Embed</text>
    <text x="616" y="210" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#fbbf24">text-embedding-v4</text>
    <text x="616" y="232" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">one vector per claim</text>
  </g>
  
  <line x1="842" y1="202" x2="881" y2="202" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  
  <g>
    <rect x="890" y="160" width="236" height="84" rx="10"
          fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="890" y="160" width="3.5" height="84" rx="2" fill="#1e293b"/>
    <text x="908" y="188" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Shortlist</text>
    <text x="908" y="210" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#94a3b8">cosine · top-5</text>
    <text x="908" y="232" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">what might collide?</text>
  </g>
  
  <line x1="1134" y1="202" x2="1173" y2="202" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  
  <g>
    <rect x="1182" y="160" width="258" height="84" rx="10"
          fill="#0d1b2a" stroke="#5eead4" stroke-width="1.5"/>
    <rect x="1182" y="160" width="3.5" height="84" rx="2" fill="#5eead4"/>
    <text x="1200" y="188" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Adjudicate</text>
    <text x="1200" y="210" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#5eead4">qwen3.7-plus</text>
    <text x="1200" y="232" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">does this KILL that?</text>
  </g>

  <!-- the thesis, said once, in the one place it cannot be missed -->
  <rect x="700" y="266" width="740" height="42" rx="8" fill="#134e4a" fill-opacity="0.35" stroke="#5eead4" stroke-opacity="0.35"/>
  <text x="722" y="293" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" fill="#5eead4">
    Cosine can only <tspan font-weight="700">shortlist</tspan>. Only reasoning can <tspan font-weight="700">rule</tspan>. Every other memory system stops one arrow earlier.
  </text>

  <!-- rulings -->
  
  <line x1="1311" y1="304" x2="1311" y2="349" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  <text x="1130" y="340" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">one ruling per candidate</text>

  
  <g>
    <rect x="1182" y="358" width="258" height="66" rx="10"
          fill="#1a0b12" stroke="#fb7185" stroke-width="1.5"/>
    <rect x="1182" y="358" width="3.5" height="66" rx="2" fill="#fb7185"/>
    <text x="1200" y="386" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">supersedes</text>
    <text x="1200" y="408" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#fb7185">the old claim dies</text>
    
  </g>
  
  <g>
    <rect x="1182" y="436" width="258" height="66" rx="10"
          fill="#0f172a" stroke="#5eead4" stroke-width="1.5"/>
    <rect x="1182" y="436" width="3.5" height="66" rx="2" fill="#5eead4"/>
    <text x="1200" y="464" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">refines / new</text>
    <text x="1200" y="486" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#5eead4">inserted alongside</text>
    
  </g>
  
  <g>
    <rect x="1182" y="514" width="258" height="66" rx="10"
          fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="1182" y="514" width="3.5" height="66" rx="2" fill="#1e293b"/>
    <text x="1200" y="542" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">duplicate</text>
    <text x="1200" y="564" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#94a3b8">dropped, no new info</text>
    
  </g>

  <!-- ============================== THE STORE ============================== -->
  <text x="60" y="400" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12" font-weight="700" fill="#94a3b8"
        letter-spacing="1.6">THE STORE — NOTHING IS EVER DELETED</text>

  <rect x="60" y="418" width="1080" height="222" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="82" y="450" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="17" font-weight="650" fill="#e2e8f0">Claim store</text>
  <text x="196" y="450" font-family="DejaVu Sans Mono, monospace" font-size="13" fill="#94a3b8">SQLite · node:sqlite · no vector DB</text>

  <!-- a revision chain, drawn as it actually renders -->
  <rect x="82" y="468" width="1036" height="52" rx="8" fill="#4c0519" fill-opacity="0.25" stroke="#fb7185" stroke-opacity="0.4"/>
  <text x="102" y="492" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#fb7185">DEAD</text>
  <text x="164" y="492" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="15" fill="#94a3b8" text-decoration="line-through">The project uses Postgres.</text>
  <text x="164" y="511" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#fb7185">† died 1 Jul · "switched to SQLite on 1 Jul; Postgres is no longer in use" · killer + date + reason, all kept</text>

  <rect x="82" y="530" width="1036" height="46" rx="8" fill="#134e4a" fill-opacity="0.25" stroke="#5eead4" stroke-opacity="0.4"/>
  <text x="102" y="552" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#5eead4">LIVE</text>
  <text x="164" y="552" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="15" fill="#e2e8f0">Meridian runs on SQLite.</text>
  <text x="164" y="569" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">confidence 0.91 · kind: config · half-life 30d · provenance: session 9, verbatim quote retained</text>

  <text x="82" y="606" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13" fill="#94a3b8">
    Decay: <tspan font-family="DejaVu Sans Mono, monospace" fill="#5eead4">confidence(t) = c₀ · 2^(−age / halfLife[kind])</tspan>
    <tspan dx="16">identity 10y · config 30d · event never — a thing that happened cannot become false</tspan>
  </text>
  <text x="82" y="626" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13" fill="#94a3b8">Every claim keeps: content · kind · subject · provenance · observedAt · status · confidence · supersededBy · deathReason</text>

  <!-- ============================== READ PATH ============================== -->
  <text x="60" y="682" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12" font-weight="700" fill="#94a3b8"
        letter-spacing="1.6">READ PATH — WHY A CORPSE IS NEVER SERVED</text>

  
  <g>
    <rect x="60" y="700" width="216" height="92" rx="10"
          fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="60" y="700" width="3.5" height="92" rx="2" fill="#1e293b"/>
    <text x="78" y="728" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Question</text>
    <text x="78" y="750" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#94a3b8">"which database?"</text>
    
  </g>
  
  <line x1="284" y1="746" x2="323" y2="746" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  
  <g>
    <rect x="332" y="700" width="262" height="92" rx="10"
          fill="#0f172a" stroke="#5eead4" stroke-width="1.5"/>
    <rect x="332" y="700" width="3.5" height="92" rx="2" fill="#5eead4"/>
    <text x="350" y="728" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">believed(now)</text>
    <text x="350" y="750" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#5eead4">active claims only</text>
    <text x="350" y="772" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">a corpse is unreachable</text>
  </g>
  
  <line x1="602" y1="746" x2="641" y2="746" stroke="#94a3b8" stroke-width="1.6"
        marker-end="url(#a)"/>
  
  
  <g>
    <rect x="650" y="700" width="230" height="92" rx="10"
          fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="650" y="700" width="3.5" height="92" rx="2" fill="#fbbf24"/>
    <text x="668" y="728" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650"
          fill="#e2e8f0">Answer</text>
    <text x="668" y="750" font-family="DejaVu Sans Mono, monospace" font-size="12.5"
             fill="#fbbf24">qwen3.7-plus</text>
    <text x="668" y="772" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13"
             fill="#94a3b8">grounded in live beliefs</text>
  </g>

  <rect x="904" y="700" width="236" height="92" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="922" y="728" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="16.5" font-weight="650" fill="#e2e8f0">MCP server</text>
  <text x="922" y="750" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#94a3b8">remember · recall · why</text>
  <text x="922" y="772" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13" fill="#94a3b8">any agent can plug in</text>

  <!-- ============================== BENCHMARK ============================== -->
  <rect x="1182" y="596" width="258" height="182" rx="10" fill="#0f172a" stroke="#5eead4" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="1200" y="626" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1.4">BENCHMARK</text>
  <text x="1200" y="650" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">on facts that CHANGED</text>

  <text x="1200" y="682" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13" fill="#94a3b8">naive RAG</text>
  <rect x="1200" y="690" width="66" height="7" rx="3.5" fill="#fb7185" fill-opacity="0.65"/>
  <text x="1276" y="697" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" font-weight="700" fill="#fb7185">36%</text>

  <text x="1200" y="722" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="13" fill="#5eead4">Palimpsest</text>
  <rect x="1200" y="730" width="134" height="7" rx="3.5" fill="#5eead4"/>
  <text x="1344" y="737" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" font-weight="700" fill="#5eead4">73%</text>

  <line x1="1200" y1="752" x2="1422" y2="752" stroke="#1e293b"/>
  <text x="1200" y="770" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">dead facts served:</text>
  <text x="1330" y="770" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" font-weight="700" fill="#fb7185">3</text>
  <text x="1346" y="770" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">vs</text>
  <text x="1372" y="770" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" font-weight="700" fill="#5eead4">0</text>

  <!-- ============================== DEPLOYMENT ============================== -->
  <rect x="60" y="812" width="1380" height="128" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="82" y="844" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1.6">DEPLOYED ON ALIBABA CLOUD</text>

  <circle cx="90" cy="878" r="4" fill="#5eead4"/>
  <text x="104" y="883" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" font-weight="650" fill="#e2e8f0">Function Compute 3.0</text>
  <text x="104" y="903" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">ap-southeast-1 (Singapore) · custom runtime</text>
  <text x="104" y="921" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">HTTP trigger · scale to zero · 525ms cold start</text>

  <circle cx="470" cy="878" r="4" fill="#fbbf24"/>
  <text x="484" y="883" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" font-weight="650" fill="#e2e8f0">Qwen Cloud</text>
  <text x="484" y="903" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">DashScope International (Singapore)</text>
  <text x="484" y="921" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">qwen3.7-plus · qwen3.6-flash · text-embedding-v4</text>

  <circle cx="880" cy="878" r="4" fill="#5eead4"/>
  <text x="894" y="883" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" font-weight="650" fill="#e2e8f0">Vendored Node 24</text>
  <text x="894" y="903" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">node:sqlite needs Node 22+; every FC</text>
  <text x="894" y="921" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">runtime stops at 20 — so we bring our own</text>

  <circle cx="1176" cy="878" r="4" fill="#5eead4"/>
  <text x="1190" y="883" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="14" font-weight="650" fill="#e2e8f0">Custom domain + TLS</text>
  <text x="1190" y="903" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">Alibaba force-downloads any HTML</text>
  <text x="1190" y="921" font-family="Inter, DejaVu Sans, Liberation Sans, sans-serif" font-size="12.5" fill="#94a3b8">from its own domains — so we need one</text>

  <text x="60" y="972" font-family="DejaVu Sans Mono, monospace" font-size="13" fill="#94a3b8">palimpsest.zettabyteincorp.com</text>
  <text x="1440" y="972" font-family="DejaVu Sans Mono, monospace" font-size="13" fill="#94a3b8" text-anchor="end">github.com/joyahmed/palimpsest · MIT</text>
